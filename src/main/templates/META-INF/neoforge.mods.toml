logoFile="icon.png"
credits="Original author - Tec"
authors="ludwici"
description='''
Larger-scale fluid textures
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="${mod_id}.extra.mixins.json"

[[dependencies.${mod_id}]]
